<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Rastreador de Ônibus</title>

    <link href="/src/css/style.css" rel="stylesheet">

    <!-- Fonte (de Texto) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.19.10/proj4.js"></script>
</head>
<body>

    <!-- Modal que vai avisar ao usuário que está carregando -->
    <div id="modal-carregamento" style="position: fixed; top: 40px; left: 0; width: 100vw; height: auto; z-index: 99999; display: flex; justify-content: center; align-items: flex-start;">

        <div style="background-color: #ffffff; padding: 30px 30px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; align-items: center; font-family: system-ui, -apple-system, sans-serif;">

            <span style="color: #333333; font-weight: 600; font-size: 16px; margin: 0;">Atualizando...</span>

        </div>
    </div>

    <div class="container-fluid mt-1" style="background-color: var(--background-color);">
        <div class="row justify-content-center">
            <div class="col-11 col-md-11 position-relative">
                <h2 class="map-title text-center mt-0">Rastreador de Ônibus</h2>

                <!-- div do mapa -->
                <div id="map" class="bg-secondary rounded" style="height: 90vh;"></div>

                <!-- div responsável pelas opções que o usuário pode escolher -->
                <div class="low-map position-absolute top-100 start-50 p-3">
                    <div class="options bg-white p-3 rounded shadow-sm" style="min-width: 500px;">
                        <!-- select para escolher a linha de ônibus -->
                        <label for="busLineSelect" class="mb-2 fw-medium">Selecione uma linha para rastrear</label>
                        <select id="busLineSelect" class="form-select mb-3">
                            <option value="">Selecione uma linha</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    <!-- Scripts -->
    <script src="/src/js/app.js"></script>
</body>
</html>
